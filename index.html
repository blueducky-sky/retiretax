<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.0.3/dist/tailwind.min.css" rel="stylesheet">
    <title>세금 계산기 및 AI 챗봇</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function calculateTax(income) {
            // Add your tax calculation logic here
            return income * 0.15;  // example of a 15% tax rate
        }
        $(document).ready(function() {
            $('#calculate').click(function() {
                var income = parseFloat($('#income').val());
                var tax = calculateTax(income);
                $('#result').text('계산된 세금: ' + tax + ' 원');
            });
        });
    </script>
</head>
<body class="bg-gray-100 p-4">
    <div class="container mx-auto">
        <h1 class="text-2xl font-bold mb-4">세금 계산기 및 AI 챗봇</h1>
        <label class="block mb-2">
            소득을 입력하세요:
            <input type="number" id="income" class="border rounded px-2 py-1 w-full"/>
        </label>
        <button id="calculate" class="bg-blue-500 text-white px-4 py-2 rounded">세금 계산하기</button>
        <div id="result" class="mt-4"></div>
        <div id="chatbot" class="mt-4">
            <h2 class="text-xl font-semibold">AI 챗봇</h2>
            <textarea id="chatInput" class="border rounded w-full p-2" rows="3" placeholder="질문을 입력하세요..."></textarea>
            <button id="send" class="bg-green-500 text-white px-4 py-2 rounded mt-2">전송</button>
            <div id="chatResponse" class="mt-2"></div>
        </div>
    </div>
    <script>
        $('#send').click(function() {
            var userInput = $('#chatInput').val();
            // Here, you would call your AI chat function
            $('#chatResponse').text('AI 응답: ' + userInput); // Dummy response
        });
    </script>
</body>
</html>
