<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retiretax</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        /* Add additional styles here */
    </style>
</head>
<body>
    <div id="chat-bot" class="fixed bottom-0 right-0 m-4 bg-white shadow-lg rounded-lg p-4">
        <h2 class="text-lg font-bold">Chat Bot</h2>
        <div id="messages" class="mb-4 h-64 overflow-y-auto border border-gray-300 rounded-lg p-2"></div>
        <textarea id="input-message" class="w-full border border-gray-300 rounded-lg p-2" placeholder="Type your message..."></textarea>
        <button onclick="sendMsg()" class="w-full bg-blue-500 text-white rounded-lg p-2 mt-2">Send</button>
    </div>
    <script>
        function toggleChat() {
            const chatBot = document.getElementById('chat-bot');
            chatBot.style.display = chatBot.style.display === 'none' ? 'block' : 'none';
        }

        function sendMsg() {
            const input = document.getElementById('input-message');
            const messageContainer = document.getElementById('messages');
            const newMessage = document.createElement('div');
            newMessage.textContent = input.value;
            messageContainer.appendChild(newMessage);
            input.value = '';
        }
    </script>
</body>
</html>
