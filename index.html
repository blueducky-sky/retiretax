<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 퇴직소득세 정밀 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800 mb-2 text-blue-600">💰 AI 퇴직소득세 계산기</h1>
            <p class="text-slate-500">2026년 최신 세법 로직이 적용된 정밀 계산 서비스</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200">
                <h2 class="text-xl font-bold mb-6 flex items-center text-slate-700">
                    <i class="fa-solid fa-pen-to-square mr-2 text-blue-500"></i> 정보 입력
                </h2>
               
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1">입사일</label>
                        <input type="date" id="joinDate" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1">퇴사일 (예정)</label>
                        <input type="date" id="exitDate" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-600 mb-1">퇴직금 총액 (원)</label>
                        <input type="number" id="totalPay" placeholder="예: 150000000" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        <p id="koreanAmount" class="text-sm text-blue-600 mt-2 font-medium h-5"></p>
                    </div>
                   
                    <div class="pt-4 border-t border-slate-100">
                        <label class="flex items-center cursor-pointer group">
                            <input type="checkbox" id="irpOption" class="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500">
                            <span class="ml-3 text-sm text-slate-600 group-hover:text-blue-600 transition-colors">IRP 계좌로 수령 (세금 30% 감면)</span>
                        </label>
                    </div>

                    <button id="calcBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-[0.98] mt-4">
                        정밀 계산 및 AI 분석 실행
                    </button>
                </div>
            </div>

            <div id="resultContainer" class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200 flex flex-col">
                <h2 class="text-xl font-bold mb-6 flex items-center text-slate-700">
                    <i class="fa-solid fa-square-poll-vertical mr-2 text-green-500"></i> 분석 결과
                </h2>

                <div id="placeholderText" class="flex-1 flex flex-col items-center justify-center text-slate-400 py-10">
                    <i class="fa-solid fa-calculator text-5xl mb-4 opacity-20"></i>
                    <p class="text-center leading-relaxed">정보를 입력하고 버튼을 누르면<br>정밀 계산 결과가 여기에 나타납니다.</p>
                </div>

                <div id="resultContent" class="hidden space-y-6 animate-in fade-in duration-500">
                    <div class="bg-blue-50 p-6 rounded-2xl text-center border border-blue-100 shadow-inner">
                        <p class="text-xs text-blue-500 font-bold mb-1 uppercase tracking-wider">예상 실수령액</p>
                        <h3 id="netPayDisplay" class="text-3xl font-black text-blue-900 tracking-tight">0원</h3>
                    </div>

                    <div class="space-y-3 bg-slate-50 p-5 rounded-xl border border-slate-100">
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-slate-500">인정 근속연수</span>
                            <span id="yearsDisplay" class="font-bold text-slate-800">0년</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-slate-500">산출 소득세</span>
                            <span id="taxDisplay" class="font-bold text-red-500">0원</span>
                        </div>
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-slate-500">지방소득세</span>
                            <span id="localTaxDisplay" class="font-bold text-red-400">0원</span>
                        </div>
                        <div class="flex justify-between items-center pt-3 mt-1 border-t border-slate-200">
                            <span class="text-slate-700 font-bold">공제 세금 합계</span>
                            <span id="totalTaxDisplay" class="text-lg font-black text-red-600">0원</span>
                        </div>
                    </div>

                    <div class="bg-amber-50 p-5 rounded-2xl border border-amber-100 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-amber-400"></div>
                        <p class="text-xs font-black text-amber-700 mb-2 flex items-center">
                            <i class="fa-solid fa-robot mr-2"></i> AI AGENT ADVICE
                        </p>
                        <p id="aiInsightText" class="text-sm text-amber-900 leading-relaxed font-medium">
                            데이터를 기반으로 절세 전략을 분석 중입니다.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 안전하게 요소 가져오기
        const getEl = (id) => document.getElementById(id);

        // 금액 한글 표시 실시간 이벤트
        getEl('totalPay').addEventListener('input', function(e) {
            const val = e.target.value;
            if(!val || val < 0) { getEl('koreanAmount').innerText = ""; return; }
            const format = new Intl.NumberFormat('ko-KR').format(val);
            const manWon = Math.floor(val / 10000);
            const eokWon = Math.floor(manWon / 10000);
            const restMan = manWon % 10000;
           
            let koreanText = "약 ";
            if(eokWon > 0) koreanText += eokWon + "억 ";
            if(restMan > 0) koreanText += restMan + "만 ";
            koreanText += "원 (" + format + "원)";
           
            getEl('koreanAmount').innerText = koreanText;
        });

        // 버튼 클릭 이벤트 리스너
        getEl('calcBtn').addEventListener('click', function() {
            const joinDate = getEl('joinDate').value;
            const exitDate = getEl('exitDate').value;
            const totalPay = parseFloat(getEl('totalPay').value);
            const isIrp = getEl('irpOption').checked;

            if(!joinDate || !exitDate || isNaN(totalPay)) {
                alert("입사일, 퇴사일, 퇴직금을 모두 정확히 입력해 주세요.");
                return;
            }

            // 1. 근속연수 계산
            const start = new Date(joinDate);
            const end = new Date(exitDate);
            let years = Math.ceil((end - start) / (1000 * 60 * 60 * 24 * 365.25));
            if (years < 1) years = 1;

            // 2. 근속연수 공제 (2026 세법 반영)
            let serviceDeduction = 0;
            if (years <= 5) serviceDeduction = years * 1000000;
            else if (years <= 10) serviceDeduction = 5000000 + (years - 5) * 2000000;
            else if (years <= 20) serviceDeduction = 15000000 + (years - 10) * 2500000;
            else serviceDeduction = 40000000 + (years - 20) * 3000000;

            // 3. 환산급여 계산
            const incomeAfterDeduction = Math.max(0, totalPay - serviceDeduction);
            const conversionPay = (incomeAfterDeduction * 12) / years;

            // 4. 환산급여별 세액공제
            let convDeduction = 0;
            if (conversionPay <= 8000000) convDeduction = conversionPay;
            else if (conversionPay <= 70000000) convDeduction = 8000000 + (conversionPay - 8000000) * 0.6;
            else if (conversionPay <= 190000000) convDeduction = 45200000 + (conversionPay - 70000000) * 0.55;
            else convDeduction = 111200000 + (conversionPay - 190000000) * 0.5;

            const taxBase = Math.max(0, conversionPay - convDeduction);

            // 5. 기본세율 (2024~2026 표준)
            let convCalcTax = 0;
            if (taxBase <= 14000000) convCalcTax = taxBase * 0.06;
            else if (taxBase <= 50000000) convCalcTax = taxBase * 0.15 - 1260000;
            else if (taxBase <= 88000000) convCalcTax = taxBase * 0.24 - 5760000;
            else if (taxBase <= 150000000) convCalcTax = taxBase * 0.35 - 15440000;
            else if (taxBase <= 300000000) convCalcTax = taxBase * 0.38 - 19940000;
            else if (taxBase <= 500000000) convCalcTax = taxBase * 0.40 - 25940000;
            else if (taxBase <= 1000000000) convCalcTax = taxBase * 0.42 - 35940000;
            else convCalcTax = taxBase * 0.45 - 65940000;

            // 6. 최종 세액 결정
            let finalIncomeTax = Math.floor((convCalcTax * years) / 12 / 10) * 10;
           
            // IRP 감면 (30%)
            if(isIrp) finalIncomeTax = Math.floor(finalIncomeTax * 0.7 / 10) * 10;

            const finalLocalTax = Math.floor(finalIncomeTax * 0.1 / 10) * 10;
            const totalTax = finalIncomeTax + finalLocalTax;
            const netPay = totalPay - totalTax;

            // UI 표시 전환
            getEl('placeholderText').classList.add('hidden');
            getEl('resultContent').classList.remove('hidden');

            // 값 대입
            getEl('netPayDisplay').innerText = netPay.toLocaleString() + "원";
            getEl('yearsDisplay').innerText = years + "년";
            getEl('taxDisplay').innerText = finalIncomeTax.toLocaleString() + "원";
            getEl('localTaxDisplay').innerText = finalLocalTax.toLocaleString() + "원";
            getEl('totalTaxDisplay').innerText = totalTax.toLocaleString() + "원";

            // AI 조언 텍스트
            const taxRate = (totalTax / totalPay * 100).toFixed(1);
            let aiText = `현재 고객님의 실효세율은 **${taxRate}%**로 분석됩니다. `;
            if(isIrp) {
                aiText += `IRP 수령을 선택하여 **약 ${(Math.floor(totalTax * 0.43)).toLocaleString()}원**의 세금 이연 및 감면 효과를 얻으셨습니다. 노후 자금 운용에 매우 유리한 전략입니다.`;
            } else {
                aiText += `일시금 수령 시 세금 부담이 있습니다. 만약 이 금액을 IRP 계좌로 받으시면 즉시 세금을 **30% 이상** 줄일 수 있습니다. 전환 여부를 검토해 보세요.`;
            }
            getEl('aiInsightText').innerHTML = aiText;
        });
    </script>
</body>
</html>
